[build]
  publish = "dist"

[[redirects]]
  from = "/assetlinks.json"
  to = "/assetlinks.json"
  status = 200
  force = true

[[redirects]]
  from = "/.well-known/assetlinks.json"
  to = "/assetlinks.json"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"